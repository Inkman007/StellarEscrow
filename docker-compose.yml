version: '3.8'

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: stellar_escrow
      POSTGRES_USER: indexer
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  indexer:
    build:
      context: .
      dockerfile: indexer/Dockerfile
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgres://indexer:password@postgres:5432/stellar_escrow
    depends_on:
      - postgres
    command: ["./indexer", "--config", "config.toml"]

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./ssl.nginx.conf:/etc/nginx/conf.d/ssl.conf:ro
      - ./cdn-headers.nginx.conf:/etc/nginx/conf.d/cdn-headers.conf:ro
      - certbot_webroot:/var/www/certbot:ro
      - letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - indexer

  certbot:
    image: certbot/certbot:latest
    volumes:
      - certbot_webroot:/var/www/certbot
      - letsencrypt:/etc/letsencrypt
    # Initial certificate issuance — run once manually:
    # docker compose run --rm certbot certonly --webroot -w /var/www/certbot -d stellarescrow.app
    entrypoint: >
      sh -c "trap exit TERM;
             while :; do
               certbot renew --webroot -w /var/www/certbot --quiet;
               sleep 12h & wait $${!};
             done"

  backup:
    image: postgres:15
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgres://indexer:password@postgres:5432/stellar_escrow}
      - S3_BUCKET=${S3_BUCKET:-}
      - BACKUP_DIR=/var/backups/stellarescrow
      - RETENTION_DAYS=${RETENTION_DAYS:-30}
      - BACKUP_ALERT_WEBHOOK=${BACKUP_ALERT_WEBHOOK:-}
    volumes:
      - backup_data:/var/backups/stellarescrow
      - ./scripts/backup.sh:/scripts/backup.sh:ro
    depends_on:
      - postgres
    # Run daily at 02:00 UTC
    entrypoint: >
      sh -c "trap exit TERM;
             while :; do
               sleep 86400 & wait $${!};
               bash /scripts/backup.sh;
             done"

volumes:
  postgres_data:
  certbot_webroot:
  letsencrypt:
  backup_data: